<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainer Sign-On | Equinim College</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .bg-eqc-green {
      background-color: #1a7a54;
    }
    .text-eqc-green {
      color: #1a7a54;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  <!-- Header -->
  <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center shadow-sm">
    <div class="flex items-center gap-4">
      <img src="/images/eqc-logo.png" alt="EQC Institute" class="h-12 w-auto object-contain" onerror="this.onerror=null; this.src='https://equinimcollege.com/wp-content/uploads/2021/08/EQC-Logo-1.png';" />
      <div class="h-8 w-px bg-gray-300"></div>
      <h1 class="text-xl font-bold text-gray-800">Trainer Sign-On Portal</h1>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col items-center justify-center p-6 w-full max-w-4xl mx-auto">
    <div class="w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 flex flex-col" style="height: 80vh;">
      <div class="bg-eqc-green text-white p-4 text-center">
        <h2 class="text-lg font-bold">Please complete the form below to sign on</h2>
        <p class="text-sm opacity-90">Your sign-on will be automatically logged to the admin dashboard.</p>
      </div>
      
      <!-- Google Form Embed (Placeholder) -->
      <div class="flex-1 w-full bg-gray-50 flex items-center justify-center relative">
        <iframe 
          src="https://docs.google.com/forms/d/e/1FAIpQLSc2w9OjqNd7l-nrPee0kldwVIcUt79XGomp99b44MC7Aic8xQ/viewform?embedded=true" 
          width="100%" 
          height="100%" 
          frameborder="0" 
          marginheight="0" 
          marginwidth="0"
          class="absolute inset-0 w-full h-full"
        >
          Loading...
        </iframe>
        

      </div>
    </div>
  </main>
</body>
</html>
